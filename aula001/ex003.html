<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros Passos com DOM</title>
    <style>
        body{
            background-color: rgb(35, 130, 161);
            color: white;
            font: normal 18pt Arial;
        }
    </style>
</head>
<body>
    <h1>Iniciando estudos DOM</h1>
    <p>Aqui vai o resultado</p>
    <p>Aprendendo a usar o <strong>DOM</strong> em JavaScript.</p>
    <div id='msg'>Clique em mim</div>

    <script>
        var corpo = window.document.body  //window.document.body.style.background
        var p1 = window.document.getElementsByTagName('p')[1] //  Acessa um elemento pela tag

        p1.style.color = 'blue'
        corpo.style.background = 'black'
        
        window.document.write('Está escrito assim: ' + p1.innerText) // Sem formatação html
         //window.document.write(p1.innerHTML) // Formatado de acordo com o html
       
        /*
        var d = window.document.getElementById('msg')
        d.style.background = 'green'
        d.innerText = 'Estou aguardando...'
        */

        var d = window.document.querySelector('div#msg')
        d.style.color = 'red'

    </script>
</body>
</html>
