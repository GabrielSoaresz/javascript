<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Par ou Impar</title>
</head>
<body>
    <h1>Ele é Par ou Ímpar?</h1>
    <input type="number" name="txtnumber" id="txtnumber">
    <input type="button" value="Confirmar" onclick="clicar()">

    <script>
        function clicar(){
            var txtnumber = window.document.getElementById("txtnumber")
            var number = Number(txtnumber.value)

            if (number % 2 == 0 & number > 0){
                document.write(`O número ${number} é par`)
            } else if(number % 2 != 0 & number > 0){
                document.write(`O número ${number} é impar`)
            }else{
                document.write('Número menor ou igual a zero')
            }
        }
    </script>
</body>
</html>
